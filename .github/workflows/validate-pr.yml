name: Validate PR Submission

on:
  pull_request:
    branches: [main]

# Prevent concurrent validation runs for the same PR
concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Submission
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write

    steps:
      # ── Checkout with full history for diff ──────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup Node ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Get list of changed files ─────────────────────────────────────────────
      - name: Get changed files
        id: files
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      # ── Determine the author's roll number from roster.json ───────────────────
      - name: Resolve roll number from PR author
        id: roll
        run: |
          GITHUB_LOGIN="${{ github.event.pull_request.user.login }}"
          echo "PR author GitHub login: $GITHUB_LOGIN"
          
          # Find the roll number whose github field matches this login
          ROLL=$(node -e "
            const roster = JSON.parse(require('fs').readFileSync('data/roster.json','utf8'));
            const login = '$GITHUB_LOGIN'.toLowerCase();
            const entry = Object.entries(roster).find(([, v]) => v.github.toLowerCase() === login);
            if (!entry) { console.log('UNKNOWN'); } else { console.log(entry[0]); }
          ")
          
          if [ "$ROLL" = "UNKNOWN" ]; then
            echo "GitHub username not found in roster. Falling back to extracting roll from changed files..."
            CHANGED="${{ steps.files.outputs.changed }}"
            EXTRACTED=$(echo "$CHANGED" | tr ',' '\n' | grep -iE '^(activities/[0-9]{4}-[0-9]{2}-[0-9]{2}/|students/)[^/]+' | head -n 1 | awk -F'/' '{if ($1=="activities") print $3; else print $2}' | tr '[:upper:]' '[:lower:]')
            if [ -n "$EXTRACTED" ]; then
              IS_VALID=$(node -e "
                const roster = JSON.parse(require('fs').readFileSync('data/roster.json','utf8'));
                console.log(roster['$EXTRACTED'] ? 'VALID' : 'INVALID');
              ")
              if [ "$IS_VALID" = "VALID" ]; then
                ROLL="$EXTRACTED"
                echo "Resolved roll number from files: $ROLL"
              fi
            fi
          fi
          
          echo "Resolved roll number: $ROLL"
          echo "roll=${ROLL}" >> $GITHUB_OUTPUT

      # ── Check if the user is a collaborator ──────────────────────────────────
      - name: Check Collaborator Status
        id: collab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          if gh api repos/${{ github.repository }}/collaborators/$AUTHOR --silent 2>/dev/null; then
            echo "is_collaborator=true" >> $GITHUB_OUTPUT
          else
            echo "is_collaborator=false" >> $GITHUB_OUTPUT
          fi

      # ── Run the validation script ─────────────────────────────────────────────
      - name: Run validate-submission.mjs
        if: steps.roll.outputs.roll != 'UNKNOWN'
        run: |
          node scripts/validate-submission.mjs \
            --changed-files="${{ steps.files.outputs.changed }}" \
            --author-roll="${{ steps.roll.outputs.roll }}"

      - name: Fail if unknown user and not collaborator
        if: steps.roll.outputs.roll == 'UNKNOWN' && steps.collab.outputs.is_collaborator == 'false'
        run: |
          echo "❌ Author is not in roster.json and is not a collaborator."
          exit 1

      # ── On failure, post a helpful comment on the PR ───────────────────────────
      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Submission Validation Failed
              
              Your PR did not pass the automatic validation check. Common reasons:
              
              - **Wrong folder**: You edited files outside your own \`students/${process.env.ROLL}/\` or \`activities/YYYY-MM-DD/${process.env.ROLL}/\` folder.
              - **Missing files**: The required \`README.md\`, \`reflection.md\`, or \`prompts.md\` is not in your submission folder.
              - **Empty reflection**: Your \`reflection.md\` is too short. Write a real reflection (minimum 50 characters).
              - **File too large**: A file exceeds the 2 MB limit.
              - **Unknown User**: Your GitHub username is not in \`data/roster.json\`.
              
              Please check the **Actions** tab for the full error message, fix the issue, and push again.
              
              > 💡 If you believe this is a mistake, contact the placement representative.`
            })
        env:
          ROLL: ${{ steps.roll.outputs.roll }}

      # ── Auto-merge valid student submissions ───────────────────────────────────
      - name: Auto-merge PR
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          
          if [ "${{ steps.collab.outputs.is_collaborator }}" == "true" ]; then
            echo "Author $AUTHOR is a collaborator. Proceeding to auto-merge."
          else
            echo "Checking if only activities folder was edited by student..."
            CHANGED="${{ steps.files.outputs.changed }}"
            
            # Split by comma and check if every file starts with 'activities/'
            IFS=',' read -ra FILES <<< "$CHANGED"
            ONLY_ACTIVITIES=true
            for file in "${FILES[@]}"; do
              [ -z "$file" ] && continue
              if [[ "$file" != activities/* ]]; then
                ONLY_ACTIVITIES=false
                break
              fi
            done
            
            if [ "$ONLY_ACTIVITIES" = false ]; then
              echo "Student PR contains changes outside the 'activities/' folder. Skipping auto-merge."
              exit 0
            fi
            echo "Author $AUTHOR is a student and only edited activities. Submissions passed validation."
          fi
          
          echo "Approving and auto-merging PR..."
          
          # Approve the PR (Optional but helpful if branch protection requires approvals)
          gh pr review ${{ github.event.pull_request.number }} --approve -b "Automatic approval. 🎉" || echo "Approval failed or not required."
          
          # Enable auto-merge (will merge when this workflow completes if branch protection requires it)
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash -d || gh pr merge ${{ github.event.pull_request.number }} --squash -d || echo "Failed to merge PR"
